services:
  - type: web
    name: dashboard-context
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm run build:all
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        sync: false
      - key: API_USERNAME
        sync: false
      - key: API_PASSWORD
        sync: false
